spring.application.name=whizupp-jpims
server.port=8081

# Database - Production (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/whizupp_jpims
spring.datasource.username=postgres
spring.datasource.password=irafasha
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.mvc.trailing-slash-match=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true

# JWT
jwt.secret=WhizuppJPIMSSecretKey2024SecureKeyForJWTAuthentication
jwt.expiration=86400000
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=604800000
# First-login mandatory password change token (1 hour)
jwt.first-login-token-expiry=3600000

# MFA
app.mfa.issuer=WhizuppJPIMS

# Business rules
app.inventory.expiry-alert-days=30
app.auth.max-login-attempts=5
app.auth.password-reset-expiry-minutes=60
app.auth.email-verification-expiry-hours=24

# QC defaults
app.qc.ph-min=3.0
app.qc.ph-max=4.5
app.qc.brix-min=10.0
app.qc.brix-max=16.0
app.qc.default.ph-min=3.0
app.qc.default.ph-max=4.5
app.qc.default.brix-min=10.0
app.qc.default.brix-max=16.0

# Packaging (finished goods): per 1L of juice → bottles; per 12 bottles → 1 box
app.packaging.bottles-per-liter=2
app.packaging.bottles-per-box=12
app.packaging.unit-label=1L
app.packaging.bottle-material-name=Empty Bottle (1L)
app.packaging.box-material-name=Carton Box (12 bottles)
app.packaging.seed-stock=10000
app.inventory.finished-product-shelf-days=180

# File uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Scheduling
spring.task.scheduling.enabled=true

# Logging
logging.level.com.whizupp.jpims=DEBUG
logging.level.org.springframework.security=INFO

# Default admin seed (runs once if email does not exist)
app.seed.admin.enabled=true
app.seed.admin.full-name=Pacifique Administrator
app.seed.admin.email=irapac40@gmail.com
app.seed.admin.password=irafasha
app.seed.admin.phone=+233500000000
app.seed.admin.employee-id=ADMIN-001
app.seed.admin.department=IT
